<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    menu, ol, ul {
    list-style: none;
    margin: 0;
    padding: 0 0 0 20px;
}
    .list-decimal {
    list-style-type: decimal;
}
 /* 1. 隱藏原本的清單符號 */
.list-brace {
    list-style: none;
    counter-reset: brace-counter; /* 重置計數器 */
    padding-left: 20px; 
}

/* 2. 針對每一個 li 進行計數 */
.list-brace > li {
    counter-increment: brace-counter; /* 增加計數器數值 */
    position: relative;
}

/* 3. 使用 ::before 模擬標號 */
.list-brace > li::before {
    content: '(' counter(brace-counter) ') ';
    position: absolute;
    left: -25px; /* 根據需求調整位置 */
    display: inline-block;
    width: 20px;
}
    .list-none {
    list-style-type: none;
}
</style>
<body>
    <ol class="list-decimal ps-[29px]  my-4">
    <li class="mb-2.5 ps-[5px]">123</li>
    <ul class="list-none list-brace ps-[29px]">
        <li class="mb-2.5 ps-[5px]">456</li>
        <li class="mb-2.5 ps-[5px]">789</li>
    </ul>
</ol>
</body>
</html>
