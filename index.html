<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    menu, ol, ul {
    list-style: none;
    margin: 0;
    padding: 0 0 0 20px;
}
    .list-decimal {
    list-style-type: decimal;
}
    .list-brace>li::marker {
    content: "(" counter(list-item) ")";
}
    .list-none {
    list-style-type: none;
}
</style>
<body>
    <ol class="list-decimal ps-[29px]  my-4">
    <li class="mb-2.5 ps-[5px]">123</li>
    <ul class="list-none list-brace ps-[29px]">
        <li class="mb-2.5 ps-[5px]">456</li>
        <li class="mb-2.5 ps-[5px]">789</li>
    </ul>
</ol>
</body>
</html>
