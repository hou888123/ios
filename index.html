<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* 1. 隱藏原本的清單符號 */
.list-brace {
    list-style: none;
    counter-reset: brace-counter; /* 重置計數器 */
}

/* 2. 針對每一個 li 進行計數 */
.list-brace > li {
    counter-increment: brace-counter; /* 增加計數器數值 */
    position: relative;
}

/* 3. 使用 ::before 模擬標號 */
.list-brace > li::before {
    content: '(' counter(brace-counter) ') ';
    position: absolute;
    left: -25px; /* 根據需求調整位置 */
    display: inline-block;
    width: 20px;
}
</style>
<body>
    <div class="list-brace">

        <ol><li>
            test
        </li></ol>
    </div>
</body>
</html>
